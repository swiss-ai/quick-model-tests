name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Lint + format gate -- runs on every PR and push. No live endpoint needed.
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  # Static checks that need no live endpoint: package imports, suites collect.
  collect:
    name: Import & collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: pytest collection only (no API calls)
        run: pytest --collect-only -q

  # Live suite -- runs only when an endpoint secret is configured.
  suite:
    name: Functional suite (live)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run core suite against endpoint
        env:
          CSCS_SERVING_API: ${{ secrets.CSCS_SERVING_API }}
        run: |
          if [ -z "$CSCS_SERVING_API" ]; then
            echo "no endpoint secret configured; skipping live suite"; exit 0
          fi
          quick-model-tests --suite core --junit junit.xml
